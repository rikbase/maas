spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/maas
    username: maas
    password: maas
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
maas:
  encryption:
    key: ${MAAS_ENCRYPTION_KEY:change-me-in-production}
  jwt:
    secret: ${MAAS_JWT_SECRET:maas-jwt-secret-must-be-at-least-256-bits-long-for-hs256}
    expiration: 86400000
