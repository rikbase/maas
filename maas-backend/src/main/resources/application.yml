spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/maas
    username: maas
    password: maas
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
maas:
  encryption:
    key: ${MAAS_ENCRYPTION_KEY:change-me-in-production}
